<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentOS Production Sandbox</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="max-w-6xl mx-auto p-6">
        <header class="border-b border-gray-800 pb-4 mb-8">
            <h1 class="text-2xl font-bold tracking-wider text-cyan-400">🤖 AgentOS Control Plane</h1>
            <p class="text-sm text-gray-400">Production Sandbox Multi-Agent Framework</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-xl">
                    <h2 class="text-lg font-semibold text-white mb-4">🎯 Target Execution</h2>
                    <label class="block text-xs font-medium text-gray-400 mb-2 uppercase tracking-wider">Topic / Directive</label>
                    <textarea id="promptInput" rows="4" class="w-full bg-gray-900 border border-gray-700 rounded p-3 text-sm text-gray-200 focus:outline-none focus:border-cyan-500 placeholder-gray-600" placeholder="e.g., write about recent advancements in quantum computing"></textarea>
                    
                    <button id="generateBtn" onclick="runAgentWorkflow()" class="w-full mt-4 bg-cyan-600 hover:bg-cyan-500 text-white font-medium py-2.5 px-4 rounded transition-all duration-200 flex items-center justify-center gap-2">
                        <span>🚀 Launch Agents</span>
                    </button>
                </div>

                <div id="observabilityPanel" class="hidden bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-xl">
                    <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">📊 Observability Log</h3>
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between border-b border-gray-700 pb-2">
                            <span class="text-gray-400">Loop Cycles:</span>
                            <span id="metricCycles" class="text-cyan-400 font-mono font-bold">0</span>
                        </div>
                        <div class="flex justify-between border-b border-gray-700 pb-2">
                            <span class="text-gray-400">Memory Matrix Footprint:</span>
                            <span id="metricTokens" class="text-purple-400 font-mono">0 metrics</span>
                        </div>
                        <div>
                            <span class="text-gray-400 block mb-1">Audit Trace Fault Vectors:</span>
                            <ul id="faultVectors" class="text-xs space-y-1 text-red-400 bg-gray-900 p-2 rounded max-h-32 overflow-y-auto font-mono"></ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="bg-gray-800 rounded-lg border border-gray-700 shadow-xl overflow-hidden min-h-[500px] flex flex-col">
                    <div class="bg-gray-850 px-6 py-3 border-b border-gray-700 flex justify-between items-center">
                        <span class="text-sm font-semibold uppercase tracking-wider text-gray-400">📝 Final Compiled Output Asset</span>
                        <span id="statusBadge" class="px-2 py-0.5 rounded text-xs font-mono bg-gray-700 text-gray-400">IDLE</span>
                    </div>
                    
                    <div class="p-6 flex-1 overflow-y-auto prose prose-invert max-w-none text-gray-300" id="outputContent">
                        <p class="text-gray-500 italic">Initiate agent workflow to populate compilation dashboard...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function runAgentWorkflow() {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) return alert('Please enter a target topic!');

            // UI Loading State Trigger
            const btn = document.getElementById('generateBtn');
            const statusBadge = document.getElementById('statusBadge');
            const outputArea = document.getElementById('outputContent');
            const obsPanel = document.getElementById('observabilityPanel');
            
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span> Processing...`;
            statusBadge.className = "px-2 py-0.5 rounded text-xs font-mono bg-amber-500/20 text-amber-400 animate-pulse";
            statusBadge.innerText = "COLLABORATING...";
            outputArea.innerHTML = `<p class="text-cyan-400 animate-pulse font-mono">🤖 Synthesizing nodes, pruning context overhead and running critic verification loop...</p>`;

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                
                const data = await response.json();
                
                if (response.ok && data.status === "success") {
                    // Render markdown using marked.js
                    outputArea.innerHTML = marked.parse(data.final_output);
                    
                    // Update Metrics Panel
                    document.getElementById('metricCycles').innerText = `${data.loop_cycles} cycles`;
                    document.getElementById('metricTokens').innerText = `${data.token_metrics} metrics`;
                    
                    const list = document.getElementById('faultVectors');
                    list.innerHTML = '';
                    if (data.rejection_reasons.length === 0) {
                        list.innerHTML = '<li class="text-green-400">✓ 0 System Faults Detected</li>';
                    } else {
                        data.rejection_reasons.forEach((reason, index) => {
                            list.innerHTML += `<li>[Fault ${index + 1}]: ${reason}</li>`;
                        });
                    }

                    obsPanel.classList.remove('hidden');
                    statusBadge.className = "px-2 py-0.5 rounded text-xs font-mono bg-green-500/20 text-green-400";
                    statusBadge.innerText = "SUCCESS";
                } else {
                    throw new Error(data.detail || 'Workflow Error');
                }
            } catch (err) {
                outputArea.innerHTML = `<p class="text-red-400 font-mono">❌ System Exception: ${err.message}</p>`;
                statusBadge.className = "px-2 py-0.5 rounded text-xs font-mono bg-red-500/20 text-red-400";
                statusBadge.innerText = "CRITICAL FAULT";
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>🚀 Launch Agents</span>`;
            }
        }
    </script>
</body>
</html>
